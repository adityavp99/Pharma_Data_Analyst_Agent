Serious adverse event:
  definition: An adverse event where the seriousness field equals Serious.
  source_fields:
    - adverse_events.seriousness
  cautions:
    - This MVP reports descriptive synthetic counts only.

Related adverse event:
  definition: An adverse event where related_to_drug equals 1.
  source_fields:
    - adverse_events.related_to_drug
  cautions:
    - Relatedness is a synthetic flag and does not prove causality.

Enrollment target:
  definition: Planned number of patients for a trial site.
  source_fields:
    - sites.enrollment_target

Enrollment rate:
  definition: Total enrolled patients divided by total enrollment target.
  source_fields:
    - sites.enrolled_patients
    - sites.enrollment_target
  cautions:
    - Aggregate numerator and denominator before calculating the percentage.

Treatment arm:
  definition: Assigned intervention group for a synthetic patient.
  source_fields:
    - patients.treatment_arm

Therapeutic area:
  definition: Broad clinical area associated with a trial.
  source_fields:
    - trials.therapeutic_area

Net sales:
  definition: Synthetic sales revenue after discounts or adjustments.
  source_fields:
    - drug_sales.net_sales

Channel:
  definition: Commercial distribution channel for drug sales.
  source_fields:
    - drug_sales.channel

Out-of-range lab result:
  definition: A lab result where result_value is below normal_low or above normal_high.
  source_fields:
    - lab_results.result_value
    - lab_results.normal_low
    - lab_results.normal_high
  cautions:
    - Normal ranges are synthetic and simplified.
